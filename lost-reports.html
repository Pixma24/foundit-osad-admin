<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoundIT | Lost Reports</title>
    <link rel="icon" type="image/png" href="OSA Logo.png">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
    // Secure token check
    const token = localStorage.getItem("foundit_admin_token") || sessionStorage.getItem("foundit_admin_token");
    if (!token) {
        window.location.href = "admin-login.html";
    }
</script>
</head>
<body>

    <a href="admin-dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    <div class="dash-header" style="margin-top: 40px; margin-bottom: 10px;">
        <img src="university-logo.png" alt="University Logo" class="dash-logo" style="width: 50px;">
        <div class="dash-titles">
            <h2>FoundIT Admin</h2>
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h2><i class="fa-solid fa-magnifying-glass"></i> Active Lost Reports</h2>
            <input type="text" placeholder="Search by ID or Name..." style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Report ID</th>
                    <th>Student Name</th>
                    <th>Category</th>
                    <th>Color</th>
                    <th>Date Lost</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="lostTableBody">
                </tbody>
        </table>
    </div>

    <div class="footer">
        -This is a product of students from Pampanga State University-
    </div>

    <div id="dynamicFoundModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal('dynamicFoundModal')"><i class="fa-solid fa-xmark"></i></span>
            
            <div class="modal-header">
                <h3 id="modalTitle">Lost Item Details</h3>
            </div>
            
            <div class="modal-data" id="modalContent">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
